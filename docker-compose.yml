services:
  faceswap-api:
    image: ghcr.io/dvvtech/faceswap:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.faceswap-api.rule=Host(`api.cloud-platform.pro`) && PathPrefix(`/faceswap`)"
        - "traefik.http.routers.faceswap-api.entrypoints=websecure"
        - "traefik.http.routers.faceswap-api.tls.certresolver=letsencrypt"
        - "traefik.http.services.faceswap-api.loadbalancer.server.port=8080"
        - "traefik.http.middlewares.faceswap-api-stripprefix.stripprefix.prefixes=/faceswap"
        - "traefik.http.routers.faceswap-api.middlewares=faceswap-api-stripprefix"
    networks:
      - public-network5

networks:
  public-network5:
    external: true