name: Deploy Python API to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          lfs: true
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile   # ← теперь обычный Python Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Prepare docker-compose content
        id: compose
        run: |
          content=$(base64 -w 0 docker-compose.yml)
          echo "content=$content" >> $GITHUB_OUTPUT

      - name: Deploy to VM via SSH (Swarm mode)
        uses: appleboy/ssh-action@v1.0.3
        env:
          COMPOSE_B64: ${{ steps.compose.outputs.content }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: COMPOSE_B64
          script: |
            mkdir -p /home/dvvtech/deploy/faceswap
            echo "$COMPOSE_B64" | base64 -d > /home/dvvtech/deploy/faceswap/docker-compose.yml
            
            cd /home/dvvtech/deploy/faceswap
            
            echo "Pull latest image"
            docker pull ghcr.io/${{ github.repository }}:latest

            echo "Deploy stack"
            docker stack deploy -c docker-compose.yml faceswap-stack
            
            sleep 5
            
            echo "Cleanup"
            docker image prune -f
            
            echo "Services:"
            docker service ls
